name: flutter_starter_template
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  go_router: ^14.2.1
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  flutter_bloc: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
icons_launcher:
  image_path: "assets/icons/icon_launcher.png" # Gambar Launcher
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter_native_splash:
  color: "#232323" # Warna background splash screen
  image: "assets/images/splash_screen.png" # Gambar splash screen
  android: true # Aktifkan di Android
  ios: true # Aktifkan di iOS

